<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap');
  .body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Quicksand', sans-serif;
            background: black;
            color: pink;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease;
        }
  
  .msg {
  max-width: 70%;
  padding: 8px 10px;
  margin: 6px;
  border-radius: 10px;
  font-size: 14px;
  position: relative;
  animation: fadeIn 0.3s ease;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  margin-top: 3px;
  text-align: right;
}

.tick {
  font-size: 11px;
  margin-left: 5px;
}

.typing {
  display: flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: gray;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% {opacity: 0;}
  40% {opacity: 1;}
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: pink;
  overflow: hidden;
}

#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  cursor: pointer;
}

.main {
  display: none;
  text-align: center;
  padding-top: 20px;
}

.phone {
  width: 320px;
  height: 520px;
  background: #ece5dd;
  border-radius: 25px;
  margin: 20px auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: dark green;
  color: black;
  padding: 12px;
}

.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;

  background-image: black;
  background-size: cover;
  background-position: center;
}

.me {
  background: red;
  margin-left: auto;
  animation: slideRight 0.3s forwards;
}

.you {
  background: red;
  animation: slideLeft 0.3s forwards;
}

.heart {
  position: absolute;
  color: pink;
  animation: float 3s linear infinite;
}

@keyframes slideLeft {
  from {transform: translateX(-30px); opacity: 0;}
  to {transform: translateX(0); opacity: 1;}
}

@keyframes slideRight {
  from {transform: translateX(30px); opacity: 0;}
  to {transform: translateX(0); opacity: 1;}
}

.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
}
</style>
</head>

<body>

<div id="intro">
  <h2>Hii Sisya 💌</h2>
  <button onclick="start()">Click Here</button>
</div>

<div id="main">
  <h2>Sisya 💖</h2>

  <div class="phone">
    <div class="header">💬</div>
    <div class="chat" id="chat"></div>
  </div>

  <p>💖</p>

  <img src="https://i.imgur.com/3ZQ3Z6F.jpg" width="180">
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/6i6umz.mp3" type="audio/mpeg">
</audio>

<div class="music-btn">
  <button onclick="toggleMusic()">🎵</button>
</div>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";

  document.getElementById("music").play();

  setInterval(createHeart, 300);
  showMessage();
}

function toggleMusic() {
  const music = document.getElementById("music");
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

const messages = [
  {text:"Hii 👋", type:"you"},
  {text:"Hii too, Whats Wrong?", type:"me"},
  {text:"I Would To Say Something...", type:"you"},
  {text:"Whats Happen?", type:"me"},
  {text:"But Iam Nervous To say it 💖", type:"you"},
  {text:"Hey Its Okay just say it", type:"me"},
  {text:"I liked You Since Weve Met", type:"you"},
  {text:"R U Sure?", type:"me"},
  {text:"Yash R U Uncomfortable?", type:"you"},
  {text:"Nor, I Liked you too kak", type:"me"},
  {text:"I Loved You 💖", type:"me"},
  {text:"🥺", type:"you"}
];

let i = 0;
function showMessage(){
  if(i >= messages.length) return;

  const chat = document.getElementById("chat");

  const typing = document.createElement("div");
  typing.classList.add("msg", messages[i].type);

  const typingDots = document.createElement("div");
  typingDots.classList.add("typing");

  typingDots.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  typing.appendChild(typingDots);
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  const delay = Math.random() * 2000 + 1000;

  setTimeout(() => {
    typing.remove();

    const msg = document.createElement("div");
    msg.classList.add("msg", messages[i].type);

    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    msg.innerHTML = `
      ${messages[i].text}
      <div class="time">${time} 
        ${messages[i].type === "me" ? '<span class="tick">✔✔</span>' : ''}
      </div>
    `;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    i++;
    showMessage();
  }, delay);
}

 function showNext() {
 if (i < messages.length) {
 showTypingIndicator();

            setTimeout(() => {
                removeTypingIndicator();
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${messages[i].type}`;
                msgDiv.innerText = messages[i].text;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

                i++;
                setTimeout(showNext, 1500);
            }, 1000); 
        } else {
            setTimeout(() => {
                document.body.style.transition = "2s";
                document.body.style.opacity = "0";
                
                setTimeout(() => {
                    window.location.href = "surat.html"; 
                }, 1000);
            }, 2000);
        }
    }
</script>

</body>
</html>
