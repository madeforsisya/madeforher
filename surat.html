<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Surat Buat Sisya 💌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap');
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); font-family: 'Quicksand', sans-serif; overflow: hidden; }
        .envelope-wrapper { position: relative; width: 300px; height: 200px; background: #ff5e6c; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); cursor: pointer; }
        .envelope-wrapper::before { content: ""; position: absolute; top: 0; z-index: 4; border-top: 130px solid #ff7a85; border-left: 150px solid transparent; border-right: 150px solid transparent; transform-origin: top; transition: 0.5s; }
        .paper { position: absolute; bottom: 10px; left: 15px; width: 270px; height: 180px; background: white; border-radius: 5px; z-index: 2; transition: 0.8s; padding: 20px; box-sizing: border-box; }
        .paper-content { font-family: 'Dancing Script', cursive; font-size: 18px; color: #444; text-align: center; }
        .open::before { transform: rotateX(180deg); z-index: 1; }
        .open .paper { transform: translateY(-180px); height: 350px; z-index: 5; }
        .heart-seal { position: absolute; top: 85px; left: 50%; transform: translateX(-50%); z-index: 6; font-size: 40px; color: white; }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope" onclick="this.classList.add('open'); startTyping();">
        <div class="heart-seal">💖</div>
        <div class="paper">
            <div class="paper-content" id="text"></div>
        </div>
    </div>

    <script>
        const pesan = "Hii Sisya...\n\ni would to say that i really thank you for came into my life... I really like, loved you, more than you know. 💖";
        let j = 0;
        function startTyping() {
            if (j < pesan.length) {
                document.getElementById("text").innerHTML += pesan.charAt(j) === "\n" ? "<br>" : pesan.charAt(j);
                j++;
                setTimeout(startTyping, 50);
            }
        }
    </script>
</body>
</html>
